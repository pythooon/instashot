services:
  phoenix-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: phoenix_api
    volumes:
      - phoenix-db-data:/var/lib/postgresql/data
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d phoenix_api"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s

  symfony-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: instashot
    volumes:
      - symfony-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d instashot"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s

  phoenix:
    build: 
      context: ./phoenix-api
      dockerfile: Dockerfile
      target: dev
    depends_on:
      phoenix-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://postgres:postgres@phoenix-db/phoenix_api
      SECRET_KEY_BASE: ${PHOENIX_SECRET_KEY_BASE:-thisisasecret111}
      PHX_HOST: 0.0.0.0
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - ./phoenix-api:/app
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/4000' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 180s

  symfony:
    build:
      context: ./symfony-app
      dockerfile: Dockerfile
      target: dev
    depends_on:
      symfony-db:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_SECRET: ${SYMFONY_APP_SECRET:-thisisasecret222}
      PHOENIX_BASE_URL: http://phoenix:4000
      DATABASE_URL: postgres://postgres:postgres@symfony-db:5432/instashot
    ports:
      - "8000:8000"
    volumes:
      - ./symfony-app:/app
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/vendor/autoload.php"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 300s

volumes:
  phoenix-db-data:
  symfony-db-data:
